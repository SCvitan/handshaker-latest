global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'profiles-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['profiles-service:8083']

  - job_name: 'company-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['company-service:8082']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8080']